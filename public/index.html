<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Auction Lot Capture</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css?v=6" />
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <div>
        <p class="eyebrow">Current lot</p>
        <h1 id="locator">Loading...</h1>
      </div>
      <div class="count-box">
        <span id="photoCount">0</span>
        <small>photos</small>
      </div>
      <div id="status" class="status">Starting camera...</div>
    </header>

    <section class="camera-panel">
      <video id="camera" autoplay playsinline muted></video>
      <canvas id="canvas" hidden></canvas>
      <div id="preview" class="preview-strip"></div>
    </section>

    <section class="action-bar">
      <button id="captureBtn" class="primary">Take Photo</button>
      <button id="undoBtn" disabled>Undo</button>
      <button id="submitBtn" class="submit" disabled>Submit Lot</button>
    </section>

    <details class="extras">
      <summary>More options</summary>
      <div class="extras-grid">
        <label class="file-picker">
          Add photos from files
          <input id="fileInput" type="file" accept="image/*" capture="environment" multiple />
        </label>
        <div class="override-row">
          <input id="overrideInput" placeholder="Set next locator, example D42" />
          <button id="overrideBtn">Set Next</button>
        </div>
      </div>
    </details>
  </main>
  <script src="/app.js?v=6"></script>
</body>
</html>
